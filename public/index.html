<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRADE-X 2.0</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<link rel="shortcut icon" href="logo.ico" type="image/x-icon">

<style>
:root{
    --primary:#2563eb;
    --bg:#020617;
    --glass:rgba(15,23,42,.75);
    --border:rgba(255,255,255,.12);
    --text:#f8fafc;
    --green:#10b981;
    --red:#ef4444;
}

html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    font-family:Inter,sans-serif;
    color:var(--text);
}

/* ===== VIDEO ===== */
#bg-video-container{
    position:fixed;
    inset:0;
    z-index:-100;
    background:var(--bg);
}
#bg-video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
.video-overlay{
    position:fixed;
    inset:0;
    background:rgba(2,6,23,.5);
    z-index:-90;
}

/* ===== STANDBY ===== */
#default-screen{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:.7s ease;
    z-index:10001; /* Higher than iframe */
}
#default-screen.active{
    opacity:1;
    visibility:visible;
}

.standby-logo{
    width: clamp(200px, 35vw, 600px);
    height: auto;
    animation: pulseLogo 3s ease-in-out infinite;
}

@keyframes pulseLogo{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.08); }
    100%{ transform: scale(1); }
}

/* ===== DASHBOARD ===== */
#main-wrapper{
    position:relative;
    z-index:10;
    height:100vh;
    display:flex;
    flex-direction:column;
    opacity:0;
    transition:.5s ease;
}

.header{
    height:8vh;
    padding:0 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--glass);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    border-radius:0 0 28px 28px;
}
.header-logo{
    font-size:2.3rem;
    font-weight:900;
    background:linear-gradient(135deg,#00ff00 50%,#ff0000 50%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.main{
    flex:1;
    display:flex;
    gap:24px;
    padding:24px;
    overflow:hidden;
}

   /* Increased width logic: 2:1 ratio */
       .chart-box, .list-box {
            background: var(--glass);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .chart-box { flex: 3; display: flex; flex-direction: column; }
        .list-box { flex: 1; max-width: 450px; display: flex; flex-direction: column; }
        #content { flex: 1; overflow-y: auto; margin-top: 15px; }

/* ===== LEADERBOARD SCROLLING ===== */
#content{
    flex:1;
    overflow-y:auto; /* Scroll enabled */
    padding-right:12px;
    margin-top:10px;
}

/* Custom Scrollbar Styles */
#content::-webkit-scrollbar {
    width: 6px;
}
#content::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
}
#content::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
}

.team-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    border-left: 5px solid transparent;
}

/* ===== FULL SIZE IFRAME ===== */
#external-frame{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    border:none;
    z-index:10000;
    display:none;
}

/* ===== TICKER ===== */
.ticker-wrap{
    height:8vh;
    background:#000;
    display:flex;
    align-items:center;
    overflow:hidden;
    border-top:1px solid var(--border);
}
.ticker-move{
    display:flex;
    white-space:nowrap;
    animation:ticker 38s linear infinite;
}
.ticker-item{
    padding:0 2.4rem;
    font-family:JetBrains Mono;
    font-weight:800;
    font-size:1.05rem;
}
@keyframes ticker{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
}
</style>
</head>

<body>

<div id="bg-video-container">
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="screen/vid.mp4" type="video/mp4">
    </video>
</div>
<div class="video-overlay"></div>

<div id="default-screen">
    <img src="logo.png" class="standby-logo" alt="Logo">
</div>

<iframe id="external-frame"></iframe>

<div id="main-wrapper">
    <div class="header">
        <div class="header-logo">TRADE-X 2.0</div>
        <span class="badge bg-primary px-3 py-2">LIVE MARKET</span>
    </div>

    <div class="main">
        <div class="chart-box">
            <canvas id="liveChart"></canvas>
        </div>
        <div class="list-box">
            <h4 id="leaderboardTitle" class="fw-bold border-bottom pb-3">LEADERBOARD</h4>
            <div id="content"></div>
        </div>
    </div>

    <div class="ticker-wrap">
        <div id="ticker" class="ticker-move"></div>
    </div>
</div>

<script>
const socket=io();
let chart;

async function update(){
    const r=await fetch("/api/get_data");
    const d=await r.json();
    const s=d.screenState||{};

    const standby=document.getElementById("default-screen");
    const main=document.getElementById("main-wrapper");
    const iframe=document.getElementById("external-frame");

    /* 1. Full Frame Visibility Logic */
    if(s.activeView && (s.activeView.endsWith(".html") || s.activeView.includes("screen/"))){
        if (iframe.src !== window.location.origin + s.activeView) iframe.src = s.activeView;
        iframe.style.display="block";
        main.style.opacity="0";
        standby.classList.remove("active");
        return;
    } else {
        iframe.style.display="none";
        iframe.src="about:blank";
    }

    if(s.overlayActive){
        standby.classList.add("active");
        main.style.opacity="0";
        return;
    }else{
        standby.classList.remove("active");
        main.style.opacity="1";
    }

    /* 2. Ticker Update */
    const tickerHtml=d.companies.map(c=>{
        const prev=c.history.at(-2)||c.price;
        const up=c.price>=prev;
        const diff=(((c.price-prev)/prev)*100).toFixed(2);
        return `<div class="ticker-item">${c.name}
            <span style="color:${up?'var(--green)':'var(--red)'}">
            ${c.price} (${diff}%) ${up?'▲':'▼'}
            </span></div>`;
    }).join("");
    document.getElementById("ticker").innerHTML=tickerHtml+tickerHtml;

    /* 3. Triple Chart Logic (Market, Wealth, Bar) */
    const ctx=document.getElementById("liveChart").getContext('2d');
    let labels, datasets, type;

    if (s.activeView === "market_line") {
        type = "line";
        labels = d.companies[0].history.map((_, i) => "R" + i);
        datasets = d.companies.map(c => ({
            label: c.name, data: c.history, borderColor: c.color, fill: false, tension: 0.4, borderWidth: 4
        }));
    } else if (s.activeView === "wealth_line") {
        type = "line";
        labels = d.teams[0].wealth_history.map((_, i) => "R" + i);
        datasets = d.teams.map((t, i) => ({
            label: t.name, data: t.wealth_history, borderColor: `hsl(${(i*65)%360},70%,60%)`, fill: false, tension: 0.4, borderWidth: 3
        }));
    } else {
        type = "bar";
        labels = d.teams.map(t => t.name);
        datasets = d.companies.map((c, i) => ({
            label: c.name, data: d.teams.map(t => (t.stocks[i] || 0) * c.price), backgroundColor: c.color
        }));
        datasets.push({ label: 'Purse', data: d.teams.map(t => t.purse), backgroundColor: '#2563eb' });
    }

    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: type,
        data: { labels, datasets },
        options: {
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { labels: { color: "#fff" } } },
            scales: {
                x: { stacked: type === 'bar', grid: { display: false }, ticks: { color: "#94a3b8" } },
                y: { stacked: type === 'bar', grid: { color: "rgba(255,255,255,.05)" }, ticks: { color: "#94a3b8" } }
            }
        }
    });

    /* 4. Leaderboard Scroll & Colors */
    const isMarket = s.activeView === "market_line";
    const items = isMarket ? d.companies : [...d.teams].sort((a,b)=>b.wealth - a.wealth);
    
    document.getElementById("leaderboardTitle").innerText = isMarket ? "LIVE PRICES" : "LEADERBOARD";

    document.getElementById("content").innerHTML=items.map(i=>{
        const val=Math.floor(i.wealth || i.price);
        const color=(!isMarket && val < 10000) ? 'var(--red)' : 'var(--green)';
        const borderCol = isMarket ? i.color : 'transparent';
        
        return `<div class="team-row" style="border-left-color: ${borderCol}">
            <span>${i.name}</span>
            <strong style="color:${color}">${val.toLocaleString()}</strong>
        </div>`;
    }).join("");
}

socket.on("data_update",update);
update();
</script>

</body>
</html>
